<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>MoSalahDev</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* ── HTML Splash — visual clone of Flutter SplashScreen ── */
    #html-splash {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      /* Dark-theme gradient by default */
      background: linear-gradient(to bottom right, #2D4263, rgba(200, 75, 49, 0.9));
      transition: opacity 0.45s ease-out;
    }

    /* Light-theme gradient when user prefers light */
    @media (prefers-color-scheme: light) {
      #html-splash {
        background: linear-gradient(to bottom right, #254F22, rgba(160, 58, 19, 0.9));
      }
    }

    /* Prevent scrollbar / overflow while splash is visible */
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    /* ── Centred content column ── */
    .splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: splash-pulse 1.4s ease-in-out infinite alternate;
    }

    /* ── Logo container ── */
    .splash-logo-wrap {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.12);
      border: 1.5px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 18px 24px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .splash-logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Title text ── */
    .splash-title {
      margin-top: 20px;
      font-family: 'Roboto', sans-serif;
      font-weight: 700;
      font-size: 24px;
      letter-spacing: 1.2px;
      color: #ffffff;
      text-align: center;
    }

    /* ── Subtitle text ── */
    .splash-subtitle {
      margin-top: 12px;
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 16px;
      letter-spacing: 0.6px;
      color: rgba(255, 255, 255, 0.76);
      text-align: center;
    }

    /* ── Pulse animation (scale 0.95↔1 + opacity 0.75↔1) ── */
    @keyframes splash-pulse {
      0% {
        transform: scale(0.95);
        opacity: 0.75;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ── Fade-out state ── */
    #html-splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <!-- ── HTML splash layer (appears instantly, removed after Flutter paints) ── -->
  <div id="html-splash">
    <div class="splash-content">
      <div class="splash-logo-wrap">
        <img src="assets/lib/core/assets/photos/developper/M_logo.png" alt="MoSalahDev Logo">
      </div>
      <div class="splash-title">MoSalahDev</div>
      <div class="splash-subtitle">Preparing your experience...</div>
    </div>
  </div>

  <script>
    // Remove the HTML splash once Flutter has painted its first frame.
    window.addEventListener("flutter-first-frame", function () {
      var splash = document.getElementById("html-splash");
      if (!splash) return;
      splash.classList.add("fade-out");
      splash.addEventListener("transitionend", function () {
        splash.remove();
        // Restore scroll once splash is gone
        document.documentElement.style.overflow = "";
        document.body.style.overflow = "";
      });
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
